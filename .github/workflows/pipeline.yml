name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ramendo
          POSTGRES_PASSWORD: ramendo_test
          POSTGRES_DB: ramendo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: "Host=localhost;Database=ramendo_test;Username=ramendo;Password=ramendo_test"
      Jwt__Secret: "test-secret-key-at-least-32-characters-long"
      Jwt__Issuer: "ramendo-api"
      Jwt__Audience: "ramendo-client"
      Jwt__AccessTokenExpirationMinutes: "15"
      Jwt__RefreshTokenExpirationDays: "7"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  deploy:
    name: Migrate & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore & Build
        run: dotnet build --configuration Release

      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef --version 9.*

      - name: Run EF Core Migrations
        run: |
          dotnet ef database update \
            --project src/Ramendo.Infrastructure \
            --startup-project src/Ramendo.Api \
            --configuration Release
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.SUPABASE_CONNECTION_STRING }}

      - name: Trigger Render Deploy Hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
